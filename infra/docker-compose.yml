# Продакшн-окружение для proev.ru: PostgreSQL с PostGIS + бэкенд (NestJS).
# TLS и домен терминирует внешний reverse-proxy (например Nginx Proxy
# Manager на отдельной VM в приватной сети) — бэкенд открыт только на
# приватном интерфейсе (см. PRIVATE_BIND_IP в .env).
#
# Запуск: docker compose up -d
# (см. infra/README.md за пошаговой инструкцией)

services:
  postgres:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-proev}
      POSTGRES_USER: ${POSTGRES_USER:-proev}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Порт НЕ пробрасываем наружу — доступ только из docker-сети.
    # Если нужен доступ снаружи для отладки, раскомментируйте и ограничьте firewall'ом:
    # ports:
    #   - "127.0.0.1:5432:5432"
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-proev}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-proev}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-proev}?schema=public
      PORT: 3001
      ADMIN_COOKIE_SECRET: ${ADMIN_COOKIE_SECRET}
      ADMIN_SESSION_SECRET: ${ADMIN_SESSION_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    # Порт открыт только на приватном интерфейсе — снаружи недоступен,
    # NPM (отдельная VM в той же приватной сети) проксирует сюда напрямую.
    ports:
      - "${PRIVATE_BIND_IP:-192.168.38.200}:3001:3001"

networks:
  internal:

volumes:
  postgres_data:
